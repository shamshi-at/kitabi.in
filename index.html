<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kitabi</title>
    <link rel="icon" href="ico.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000034;
            color: white;
        }
        header {
            background: #000031;
            padding: 20px 20px;
            text-align: center;
        }
        header img {
            width: 120px;
            height: auto;
        }
        nav {
            background: #000033;
            padding: 10px 20px;
            text-align: center;
        }
        nav a {
            color: white;
            padding: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .footer {
            background: #000031;
            color: white;
        }
        .footer p {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Kitabi Logo">
        <h1>Welcome to Kitabi</h1>
        <p>Beyond the Bookshelf</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
    <div class="content">
        <h2>Explore Your Favorite Books</h2>
        <p>Discover, manage, and review books all in one place. Join the community of book lovers today!</p>
    </div>
    <footer class="awesome-footer">
        <p>© 2024 Kitabi. All rights reserved.</p>
    </footer>
</body>
</html>
