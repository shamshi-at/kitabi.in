[project]
name = "kitabi-api"
version = "0.1.0"
description = "Kitabi API — shared catalog + offline-first personal library sync"
requires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.ruff.lint.per-file-ignores]
# Applied migrations are never edited (CLAUDE.md) — autogenerated long lines stay.
"alembic/versions/*" = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]
# Applied migrations are never edited (CLAUDE.md) — keep autogenerated formatting.
force-exclude = "alembic/versions/"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
