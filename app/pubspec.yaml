name: kitabi
description: Kitabi — personal library, lending, and book discovery. Beyond the bookshelf.
publish_to: "none"
version: 0.1.0+33

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Local DB — source of truth (offline-first)
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # Network & auth
  dio: ^5.7.0
  supabase_flutter: ^2.8.0
  sign_in_with_apple: ^6.1.0
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0

  # ISBN barcode scanning (S7)
  mobile_scanner: ^6.0.2

  # Background sync drain
  workmanager: ^0.9.0

  # Local due-date reminders for lending (all on-device)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Push notifications (FCM) — connection requests/accepts. Dormant on a device
  # until the user grants permission; the whole feature is gated server-side.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Share a book — render a card to an image and hand it to the OS share sheet
  share_plus: ^10.1.2

  # Incoming universal/app links (kitabi.in/b|a|p/:id) → open the right screen.
  # Already present transitively (supabase uses it for the OAuth callback);
  # declared directly here for the content deep-link listener.
  app_links: ^6.3.2

  # CSV import — pick a file (S2). file_selector is the Flutter-team plugin.
  file_selector: ^1.0.3

  # Cover photo upload — pick from gallery/camera (S7b "⇧ upload a photo")
  image_picker: ^1.1.2

  # Crop a picked image to the right grid before upload — covers to 2:3
  # (book-spine portrait), author photos / publisher logos to 1:1 square.
  image_cropper: ^9.0.0

  # Open external links — the [WIRED] "Buy this edition" ecommerce redirect
  # (dormant until an edition carries a buy_url) and any future outbound link.
  url_launcher: ^6.3.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.2
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  # "The Gold Line" mark — full-bleed variant of landing-page/logo.svg (no
  # pre-baked rounding/border: the OS applies its own icon mask).
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "#7E2A33"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  ios: true

flutter_native_splash:
  # Matches lib/features/splash/presentation/splash_screen.dart exactly
  # (AppColors.paper + centered BrandMark) so the native splash hands off to
  # the Flutter one with no flash of mismatched color.
  color: "#F6F0E3"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#F6F0E3"
    image: "assets/icon/splash_logo.png"
  ios: true
  android: true
