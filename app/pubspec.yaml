name: kitabi
description: Kitabi — personal library, lending, and book discovery. Beyond the bookshelf.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Local DB — source of truth (offline-first)
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # Network & auth
  dio: ^5.7.0
  supabase_flutter: ^2.8.0
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0

  # Background sync drain
  workmanager: ^0.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.2

flutter:
  generate: true
  uses-material-design: true
