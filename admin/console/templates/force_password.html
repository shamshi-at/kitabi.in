{% extends "auth_base.html" %}
{% block title %}Set a new password · Kitabi Admin{% endblock %}
{% block content %}
<h4>Set a new password</h4>
<p class="lead">You signed in with a one-time code. Choose a new password to finish — you'll use it
next time along with your authenticator.</p>
<form method="post" action="/account/force-password">
  <div class="fld"><label>New password (min {{ minlen }} chars)</label>
    <input type="password" name="new_password" autocomplete="new-password" required autofocus></div>
  <div class="fld"><label>Confirm new password</label>
    <input type="password" name="confirm" autocomplete="new-password" required></div>
  <button class="btn p wfull" type="submit">Set password &amp; continue</button>
</form>
{% endblock %}
