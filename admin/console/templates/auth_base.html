<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Kitabi Admin{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth">
    <div class="m2">K</div>
    {% if flash %}<div class="flash {{ flash.kind }}" style="margin-bottom:16px">{{ flash.text }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
