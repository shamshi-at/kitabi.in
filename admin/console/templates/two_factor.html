{% extends "auth_base.html" %}
{% block title %}Two-factor · Kitabi Admin{% endblock %}
{% block content %}
<h4>Two-factor code</h4>
<p class="lead">Enter the current 6-digit code from your authenticator app for <b>Kitabi Admin</b>.</p>
<form method="post" action="/sign-in/2fa">
  <label class="otp-label">Authentication code</label>
  {% include "_otp_boxes.html" %}
  <button class="btn p wfull" type="submit">Verify</button>
</form>
<p style="margin-top:16px"><a class="muted-link" href="/sign-in/recovery">Lost your device? Use a recovery code</a></p>
{% endblock %}
