<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Author — Kitabi</title>
<meta name="description" content="An author on Kitabi — track, lend, and share your library.">
<meta name="theme-color" content="#241811">
<link rel="icon" href="/logo.svg?v=3" type="image/svg+xml">
<link rel="icon" href="/ico.png?v=3" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="Kitabi">
<meta property="og:title" content="An author on Kitabi">
<meta property="og:description" content="Track, lend, and share your library. Get Kitabi.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Kitabi "Reading Room" tokens — see docs/screen-design.md */
:root{
  --paper:#F6F0E3; --paper-deep:#EFE6D2; --card:#FFFCF4;
  --ink:#2B2118; --ink-soft:#7A6A55; --line:#E2D6BD;
  --oxblood:#7E2A33; --oxblood-deep:#5E1F26;
  --gold:#B8862B; --gold-soft:#F0E2C2;
  --moss:#48663F; --slate:#43617E;
  --night:#241811; --night-2:#33241A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-bottom:112px;
}
.serif{font-family:'Fraunces',Georgia,serif}
a{color:var(--oxblood)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- site header ---------- */
.site-head{display:flex;align-items:center;gap:11px;padding:16px 22px;border-bottom:1px solid var(--line);background:var(--card)}
.site-head img{width:36px;height:36px;display:block}
.site-head .bn{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:21px;color:var(--ink);text-decoration:none}
.site-head .bn small{display:block;font-family:'Inter',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-top:-2px}

/* ---------- page shell ---------- */
.wrap{max-width:900px;margin:0 auto;padding:30px 22px 0}

/* loading / error states */
.state{text-align:center;padding:70px 22px;animation:up .4s ease-out both}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--oxblood);margin:0 auto 20px;animation:spin .8s linear infinite}
.state h2{font-family:'Fraunces',Georgia,serif;font-weight:550;font-size:clamp(22px,6vw,30px);margin-bottom:10px}
.state p{color:var(--ink-soft);font-size:15px;line-height:1.7;max-width:440px;margin:0 auto}

/* ---------- author header ---------- */
.author-head{display:flex;flex-direction:column;align-items:center;text-align:center;animation:up .5s ease-out both}
.portrait{width:120px;height:120px;border-radius:50%;overflow:hidden;box-shadow:0 10px 26px rgba(43,33,24,.28);background:var(--paper-deep);flex-shrink:0}
.portrait img{width:100%;height:100%;object-fit:cover;display:block}
.monogram{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--oxblood),var(--oxblood-deep));color:var(--gold-soft);
  font-family:'Fraunces',Georgia,serif;font-size:46px;font-weight:600}
.author-head h1{font-family:'Fraunces',Georgia,serif;font-weight:550;font-size:clamp(26px,7vw,38px);margin-top:18px}
.author-head .pen{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:16px;color:var(--ink-soft);margin-top:5px}
.author-head .lang{margin-top:8px;font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--oxblood);background:#F3DFDA;padding:5px 13px;border-radius:999px;display:inline-block}
.author-head .bio{max-width:600px;margin:20px auto 0;font-size:15px;line-height:1.75;color:var(--ink);white-space:pre-line;text-align:left}

/* ---------- works grid ---------- */
.works{margin-top:44px;animation:up .5s ease-out .06s both}
.works h2{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px 16px}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(min-width:760px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.work{text-decoration:none;color:inherit;display:block}
.work .cover{width:100%;aspect-ratio:2/3;border-radius:3px 7px 7px 3px;overflow:hidden;box-shadow:0 6px 16px rgba(43,33,24,.24);position:relative;background:var(--paper-deep);transition:transform .18s ease,box-shadow .18s ease}
.work:hover .cover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(43,33,24,.3)}
.work .cover::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(0,0,0,.2);z-index:2}
.work .cover img{width:100%;height:100%;object-fit:cover;display:block}
.work .fallback{width:100%;height:100%;background:linear-gradient(150deg,var(--oxblood),var(--oxblood-deep));color:var(--gold-soft);display:flex;align-items:center;padding:14px 12px;text-align:left}
.work .fallback span{font-family:'Fraunces',Georgia,serif;font-size:13px;font-weight:600;line-height:1.25}
.work .wt{margin-top:9px;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:14px;line-height:1.25}
.work .wy{margin-top:3px;font-size:12px;color:var(--ink-soft)}

/* ---------- get-kitabi banner ---------- */
.getbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--night);color:var(--paper);
  border-top:3px solid var(--gold);padding:12px 18px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.getbar .msg{font-size:13.5px;line-height:1.4;max-width:340px}
.getbar .msg b{color:#fff;font-weight:600}
.getbar .msg .lk{color:var(--gold);text-decoration:none;font-weight:600}
.getbar .stores{display:flex;gap:9px;flex-wrap:wrap}
.store{display:flex;align-items:center;gap:9px;text-align:left;background:var(--paper);color:var(--ink);
  border-radius:12px;padding:8px 14px;text-decoration:none;border:1px solid var(--paper);min-width:150px}
.store .ic{flex-shrink:0}
.store small{display:block;font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--oxblood)}
.store span{font-size:14px;font-weight:700}
.store.ghost{background:transparent;color:var(--paper);border:1.5px solid rgba(246,240,227,.45)}
.store.ghost small{color:var(--gold)}
@media(max-width:560px){.getbar{flex-direction:column;gap:10px;text-align:center}.getbar .msg{max-width:none}}

/* ---------- footer ---------- */
footer{padding:38px 22px 30px;text-align:center;color:var(--ink-soft);font-size:12.5px;border-top:1px solid var(--line);margin-top:56px}
footer .fm{font-family:'Fraunces',Georgia,serif;font-size:15px;color:var(--ink)}

@media (prefers-reduced-motion:reduce){
  .author-head,.works,.state{animation:none}
  .work:hover .cover{transform:none}
  .spinner{animation:spin 1.4s linear infinite}
}
</style>
</head>
<body>

<header class="site-head">
  <a href="/" aria-label="Kitabi home"><img src="/logo.svg" alt="Kitabi" width="36" height="36"></a>
  <a class="bn" href="/">Kitabi<small>Beyond the Bookshelf</small></a>
</header>

<main class="wrap" id="content">
  <div class="state">
    <div class="spinner" role="status" aria-label="Loading"></div>
    <p>Turning to the author…</p>
  </div>
</main>

<!-- Get Kitabi banner — always present -->
<div class="getbar">
  <div class="msg">Track, lend, and share your library. <b>Get Kitabi</b> — <a class="lk" href="/#notify">kitabi.in</a></div>
  <div class="stores">
    <a class="store" href="/#notify" aria-label="App Store — launching soon">
      <svg class="ic" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M17.05 12.54c-.03-2.89 2.36-4.27 2.47-4.34-1.35-1.97-3.44-2.24-4.18-2.27-1.78-.18-3.47 1.05-4.37 1.05-.9 0-2.29-1.02-3.77-1-1.94.03-3.72 1.13-4.72 2.86-2.01 3.49-.51 8.66 1.45 11.5.96 1.39 2.1 2.95 3.6 2.89 1.45-.06 2-.93 3.75-.93 1.75 0 2.24.93 3.77.9 1.56-.03 2.55-1.41 3.5-2.81 1.1-1.61 1.55-3.17 1.58-3.25-.03-.01-3.03-1.16-3.08-4.6zM14.16 4.06c.8-.97 1.34-2.32 1.19-3.66-1.15.05-2.55.77-3.38 1.74-.74.86-1.39 2.23-1.22 3.55 1.29.1 2.6-.65 3.41-1.63z"/></svg>
      <span><small>Launching soon</small><span>App Store</span></span>
    </a>
    <a class="store ghost" href="/#notify" aria-label="Google Play — launching soon">
      <svg class="ic" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M4 2.3v19.4c0 .4.45.65.79.42l14.4-9.7a.5.5 0 0 0 0-.84L4.79 1.88A.5.5 0 0 0 4 2.3z"/></svg>
      <span><small>Launching soon</small><span>Google Play</span></span>
    </a>
  </div>
</div>

<footer>
  <p class="fm">Kitabi <span style="color:var(--gold)">·</span> beyond the bookshelf</p>
  <p style="margin-top:8px">
    <a href="/privacy.html" style="color:var(--oxblood);text-decoration:none">Privacy</a>
    <span style="color:var(--line)">·</span>
    <a href="/terms.html" style="color:var(--oxblood);text-decoration:none">Terms</a>
  </p>
  <p style="margin-top:8px">© <span id="y">2026</span> Kitabi. All rights reserved.</p>
</footer>

<script>
document.getElementById('y').textContent = new Date().getFullYear();

const API = (window.KITABI_API || 'https://api.kitabi.in');

function esc(v){
  if (v === null || v === undefined) return '';
  return String(v).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function readId(){
  var q = new URLSearchParams(location.search).get('id');
  if (q) return q;
  var parts = location.pathname.split('/').filter(Boolean);
  return parts.length ? decodeURIComponent(parts[parts.length - 1]) : '';
}

function initials(name){
  var words = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (!words.length) return '?';
  if (words.length === 1) return words[0].charAt(0).toUpperCase();
  return (words[0].charAt(0) + words[words.length - 1].charAt(0)).toUpperCase();
}

function workCard(w){
  var ed = w.edition || {};
  var cover = ed.cover_url
    ? '<img src="' + esc(ed.cover_url) + '" alt="Cover of ' + esc(w.title) + '" loading="lazy">'
    : '<div class="fallback"><span>' + esc(w.title || 'Untitled') + '</span></div>';
  var href = w.id ? '/b/' + encodeURIComponent(w.id) : '#';
  return '<a class="work" href="' + href + '">' +
    '<div class="cover">' + cover + '</div>' +
    '<div class="wt">' + esc(w.title || 'Untitled') + '</div>' +
    (w.first_publish_year ? '<div class="wy">' + esc(w.first_publish_year) + '</div>' : '') +
    '</a>';
}

function showError(){
  document.getElementById('content').innerHTML =
    '<div class="state">' +
      '<h2>This author isn’t available yet</h2>' +
      '<p>— but Kitabi is coming. Track, lend, and share your library when we launch. ' +
      'In the meantime, <a href="/">explore Kitabi</a>.</p>' +
    '</div>';
}

function render(data){
  var a = data.author || {};
  var works = Array.isArray(data.works) ? data.works : [];
  var name = a.name || 'Unknown author';

  document.title = name + ' — Kitabi';

  var portrait = a.image_url
    ? '<img src="' + esc(a.image_url) + '" alt="' + esc(name) + '" loading="lazy">'
    : '<div class="monogram">' + esc(initials(name)) + '</div>';

  var worksHtml = works.length
    ? '<section class="works"><h2>Works</h2><div class="grid">' +
        works.map(workCard).join('') + '</div></section>'
    : '';

  document.getElementById('content').innerHTML =
    '<section class="author-head">' +
      '<div class="portrait">' + portrait + '</div>' +
      '<h1>' + esc(name) + '</h1>' +
      (a.pen_name ? '<div class="pen">writing as ' + esc(a.pen_name) + '</div>' : '') +
      (a.primary_language ? '<span class="lang">' + esc(a.primary_language) + '</span>' : '') +
      (a.bio ? '<div class="bio">' + esc(a.bio) + '</div>' : '') +
    '</section>' +
    worksHtml;
}

(function(){
  var id = readId();
  if (!id){ showError(); return; }
  fetch(API + '/catalog/authors/' + encodeURIComponent(id), {headers:{'Accept':'application/json'}})
    .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data){
      if (!data || !data.author || !data.author.id){ showError(); return; }
      render(data);
    })
    .catch(function(){ showError(); });
})();
</script>
</body>
</html>
